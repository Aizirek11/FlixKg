{% extends 'base.html' %}
{% block title %}{{ item.title }} — FlixKG{% endblock %}
{% block content %}
<div class="container mt-5" style="max-width:800px;">
    <a href="/news/" style="color:#e50914; text-decoration:none;">← Назад к новостям</a>
    <h1 class="mt-3" style="font-weight:800;">{{ item.title }}</h1>
    <p style="color:#888; font-size:13px; margin-bottom:20px;">{{ item.created_at|date:"j-F, Y" }}</p>
    {% if item.image %}
    <img src="{{ item.image.url }}" alt="{{ item.title }}" style="width:100%; border-radius:12px; margin-bottom:24px;">
    {% endif %}
    <div style="color:#ccc; line-height:1.8; font-size:16px;">{{ item.content|linebreaks }}</div>
</div>
{% endblock %}
