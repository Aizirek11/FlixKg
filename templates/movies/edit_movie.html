{% extends 'base.html' %}
{% block title %}Редактировать фильм — FlixKG{% endblock %}

{% block extra_css %}
<style>
    .admin-card { background: #fff; border-radius: 12px; padding: 30px; margin-bottom: 25px; box-shadow: 0 2px 15px rgba(0,0,0,0.08); }
    .admin-title { font-size: 22px; font-weight: 800; margin-bottom: 20px; color: #1a1a1a; border-left: 4px solid #e50914; padding-left: 15px; }
    .form-label { font-weight: 600; color: #555; font-size: 13px; }
    .form-control, .form-select { background: #f5f5f5; border: 1px solid #ddd; color: #1a1a1a; border-radius: 8px; padding: 10px 15px; }
    .form-control:focus, .form-select:focus { border-color: #e50914; box-shadow: none; background: #fff; }
    .btn-submit { background: #e50914; color: #fff; border: none; border-radius: 8px; padding: 12px 30px; font-weight: 700; font-size: 15px; }
    .btn-submit:hover { background: #b0070f; color: #fff; }
    .btn-back { background: #f0f0f0; color: #555; border: none; border-radius: 8px; padding: 12px 30px; font-weight: 700; font-size: 15px; text-decoration: none; }
    .btn-back:hover { background: #ddd; color: #333; }
    .current-poster { width: 80px; height: 110px; object-fit: cover; border-radius: 8px; margin-bottom: 8px; }
</style>
{% endblock %}

{% block content %}
<div class="container mt-4 pb-5" style="max-width: 800px;">
    <div class="admin-card">
        <div class="admin-title">✏️ Редактировать фильм</div>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Название фильма *</label>
                    <input type="text" name="title" class="form-control" value="{{ movie.title }}" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Год выхода *</label>
                    <input type="number" name="release_year" class="form-control" value="{{ movie.release_year }}" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Длительность (мин) *</label>
                    <input type="number" name="duration" class="form-control" value="{{ movie.duration }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Описание *</label>
                    <textarea name="description" class="form-control" rows="3" required>{{ movie.description }}</textarea>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Возрастной рейтинг *</label>
                    <select name="age_limit" class="form-select">
                        <option value="0+" {% if movie.age_limit == '0+' %}selected{% endif %}>0+</option>
                        <option value="6+" {% if movie.age_limit == '6+' %}selected{% endif %}>6+</option>
                        <option value="12+" {% if movie.age_limit == '12+' %}selected{% endif %}>12+</option>
                        <option value="16+" {% if movie.age_limit == '16+' %}selected{% endif %}>16+</option>
                        <option value="18+" {% if movie.age_limit == '18+' %}selected{% endif %}>18+</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Жанр *</label>
                    <select name="genre" class="form-select" multiple>
                        {% for genre in genres %}
                        <option value="{{ genre.id }}" {% if genre in movie.genre.all %}selected{% endif %}>{{ genre.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Постер (оставьте пустым чтобы не менять)</label>
                    {% if movie.poster %}
                    <div><img src="{{ movie.poster.url }}" class="current-poster"></div>
                    {% endif %}
                    <input type="file" name="poster" class="form-control" accept="image/*">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Трейлер YouTube (ссылка)</label>
                    <input type="url" name="trailer_url" class="form-control" value="{{ movie.trailer_url }}">
                </div>
            </div>
            <div class="d-flex gap-3 mt-4">
                <button type="submit" class="btn-submit">💾 Сохранить</button>
                <a href="/admin-panel/" class="btn-back">← Назад</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
